name: Intelligence Station — Weekly Scout

on:
  workflow_dispatch:       # Manual trigger anytime
  schedule:
    - cron: '0 1 * * 1'  # Every Monday 6:30 AM IST (1:00 AM UTC)

jobs:
  scout:
    name: Scout → Analyse → Connect → Brief → Email
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Intelligence Station pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GH_SCOUT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_REPOS_PER_DOMAIN: '5'
        run: python scripts/run_pipeline.py

      - name: Commit brief.json to repo
        run: |
          git config user.name  "Intelligence Station Bot"
          git config user.email "bot@github-intel-station"
          git add public/brief.json
          git diff --staged --quiet || git commit -m "📋 Weekly brief — $(date +'%Y-%m-%d')"
          git push

      - name: Send email brief
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_brief.py
